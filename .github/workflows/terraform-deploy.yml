name: Terraform Deploy to GCP

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'environments/**'
      - 'tfvars/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'environments/**'
      - 'tfvars/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TERRAFORM_VERSION: '1.15.4'
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
  GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
  TF_BACKEND_BUCKET: ${{ secrets.GCP_TERRAFORM_BUCKET_DEV }}
  environment_name: "terrafotm-state-dev"
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  authenticate-gcp:
    name: Authenticate to GCP
    runs-on: ubuntu-latest
    outputs:
      gcp_token: ${{ steps.auth.outputs.access_token }}
    
    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP Authentication
        run: |
          echo "✓ Successfully authenticated to GCP Project: ${{ env.GCP_PROJECT_ID }}"
          gcloud config get-value project
          gcloud auth list

      - name: Test GCP Access
        run: |
          echo "Testing access to Terraform Backend..."
          gsutil ls gs://${{ env.TF_BACKEND_BUCKET }}/ || echo "⚠ Backend bucket not accessible yet"

  terraform-init:
    name: Terraform Init
    runs-on: ubuntu-latest
    needs: authenticate-gcp
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ env.environment_name }}"

      - name: Terraform Validate
        working-directory: ./environments
        run: terraform validate

      # - name: Terraform Plan
      #   working-directory: ./environments
      #   run: |
      #     terraform plan \
      #       -var-file="../tfvars/dev/dev.tfvars" \
      #       -out=tfplan-dev.tfplan

  terraform-plan:
    name: Terraform Plan 
    runs-on: ubuntu-latest
    needs: [authenticate-gcp, terraform-init]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ env.environment_name }}"

      - name: Terraform Plan
        working-directory: ./environments
        run: |
          terraform plan \
            -var-file="../tfvars/dev/dev.tfvars" \
            -out=tfplan-dev.tfplan

      - name: Save Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ./environments/tfplan-dev.tfplan
          retention-days: 7


  Terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [authenticate-gcp, terraform-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ env.environment_name }}"

      # - name: Download Plan Artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: tfplan-dev.tfplan
      #     path: ./environments

      - name: Terraform Apply - ${{ matrix.environment }}
        working-directory: ./environments
        run: terraform apply -auto-approve

      - name: Terraform Output
        working-directory: ./environments
        run: terraform output -json > terraform-output-dev.json

      - name: Display Terraform Output
        working-directory: ./environments
        run: cat terraform-output-dev.json

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-output-dev
          path: ./environments/terraform-output-dev.json
          retention-days: 30

  Terraform-destroy:
    name: Destroy Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: authenticate-gcp
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ env.environment_name }}"

      - name: Terraform Destroy
        working-directory: ./environments
        run: |
          echo "⚠️ DESTROYING TERRAFORM INFRASTRUCTURE ⚠️"
          echo "Environment: ${{ env.environment_name }}"
          terraform destroy \
            -var-file="../tfvars/dev/dev.tfvars" \
            -auto-approve

      - name: Confirm Destruction
        run: |
          echo "✓ Infrastructure destroyed successfully"
          echo "Resources have been removed from GCP project: ${{ env.GCP_PROJECT_ID }}"

