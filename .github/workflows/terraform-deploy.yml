name: Terraform Deploy to GCP

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'environments/**'
      - 'tfvars/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'environments/**'
      - 'tfvars/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TERRAFORM_VERSION: '1.15.4'
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_BACKEND_BUCKET: ${{ secrets.GCP_TERRAFORM_BUCKET }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  authenticate-gcp:
    name: Authenticate to GCP
    runs-on: ubuntu-latest
    outputs:
      gcp_token: ${{ steps.auth.outputs.access_token }}
    
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP Authentication
        run: |
          echo "✓ Successfully authenticated to GCP Project: ${{ env.GCP_PROJECT_ID }}"
          gcloud config get-value project
          gcloud auth list

      - name: Test GCP Access
        run: |
          echo "Testing access to Terraform Backend..."
          gsutil ls gs://${{ env.TF_BACKEND_BUCKET }}/ || echo "⚠ Backend bucket not accessible yet"

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: authenticate-gcp
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # - name: Terraform Format Check
      #   working-directory: ./environments
      #   run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ./environments
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./environments
        run: terraform validate

  terraform-plan:
    name: Plan Terraform - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [authenticate-gcp, terraform-validate]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        environment: [dev, prod]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ matrix.environment }}"

      - name: Terraform Plan - ${{ matrix.environment }}
        working-directory: ./environments
        run: |
          terraform plan \
            -var-file="../tfvars/${{ matrix.environment }}/${{ matrix.environment }}.tfvars" \
            -out=tfplan-${{ matrix.environment }}.tfplan

      - name: Save Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ./environments/tfplan-${{ matrix.environment }}.tfplan
          retention-days: 7

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./environments/tfplan-${{ matrix.environment }}.tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan - ${{ matrix.environment }}\n\`\`\`\n${plan}\n\`\`\``
            });

  terraform-apply:
    name: Apply Terraform - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [authenticate-gcp, terraform-plan]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        environment: [dev, prod]
      max-parallel: 1
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./environments
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ matrix.environment }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ./environments

      - name: Terraform Apply - ${{ matrix.environment }}
        working-directory: ./environments
        run: terraform apply -auto-approve tfplan-${{ matrix.environment }}.tfplan

      - name: Terraform Output
        working-directory: ./environments
        run: terraform output -json > terraform-output-${{ matrix.environment }}.json

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: terraform-output-${{ matrix.environment }}
          path: ./environments/terraform-output-${{ matrix.environment }}.json
          retention-days: 30

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [authenticate-gcp, terraform-validate, terraform-plan]
    if: always()
    
    steps:
      - name: Check Deployment Status
        run: |
          if [ "${{ needs.terraform-validate.result }}" != "success" ]; then
            echo "Terraform validation failed"
            exit 1
          fi
